<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두뇌 놀이터 - 브레인 코드</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --blue-dark:    #4A7EC7;
    --blue-mid:     #6B9FD4;
    --blue-light:   #A8C8E8;
    --blue-pale:    #D6E8F7;
    --blue-softest: #EEF5FC;
    --text-dark:    #2B4A6F;
    --text-mid:     #4A6F96;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, var(--blue-softest) 0%, #E8F4FF 100%);
    min-height: 100vh;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: var(--blue-dark);
    padding: 14px 40px;
    box-shadow: 0 2px 12px rgba(74,126,199,0.25);
}

.nav-left {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
}

.brain-logo { width: 44px; height: 44px; border-radius: 8px; }
.logo-text { font-family: 'Jua', sans-serif; font-size: 22px; color: white; }

.menu { list-style: none; display: flex; gap: 24px; margin: 0; padding: 0; }
.menu a {
    color: rgba(255,255,255,0.9); text-decoration: none;
    font-size: 15px; font-weight: 500;
    padding: 6px 14px; border-radius: 20px; transition: background 0.2s;
}
.menu a:hover { background: rgba(255,255,255,0.2); }

.container {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    text-align: center;
}

h1 {
    font-family: 'Jua', sans-serif;
    font-size: 36px;
    color: var(--text-dark);
    margin: 0 0 8px;
}

.subtitle {
    font-size: 15px;
    color: var(--text-mid);
    margin-bottom: 36px;
}

#menu-screen { display: block; }
#gameArea { display: none; }

.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}

.game-btn {
    background: white;
    border: 2px solid var(--blue-pale);
    border-radius: 20px;
    padding: 28px 16px;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
    color: var(--text-dark);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(74,126,199,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.game-btn .btn-icon { font-size: 36px; }
.game-btn:hover {
    border-color: var(--blue-mid);
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(74,126,199,0.2);
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: white;
    border: 1.5px solid var(--blue-pale);
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    margin-top: 24px;
    transition: all 0.2s;
}
.back-btn:hover { border-color: var(--blue-mid); color: var(--text-dark); }

.game-title {
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    color: var(--text-dark);
    margin: 0 0 24px;
}

.card-grid {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 12px;
    justify-content: center;
    margin: 0 auto 8px;
}

.card {
    width: 100px; height: 100px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    border-radius: 16px;
    background: white;
    border: 2px solid var(--blue-pale);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 3px 8px rgba(74,126,199,0.1);
}
.card:hover { border-color: var(--blue-mid); transform: scale(1.04); }

.color-card {
    width: 100px; height: 100px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    border: 3px solid transparent;
}
.color-card:hover { transform: scale(1.06); border-color: white; }

#soundToggle {
    position: fixed;
    top: 80px; right: 20px;
    width: 52px; height: 52px;
    font-size: 22px;
    border: none; border-radius: 50%;
    background: white;
    box-shadow: 0 4px 12px rgba(74,126,199,0.2);
    cursor: pointer;
    border: 1.5px solid var(--blue-pale);
    transition: all 0.2s;
}
#soundToggle:hover { background: var(--blue-softest); }

@keyframes spin    { from{transform:rotate(0)}  to{transform:rotate(360deg)} }
@keyframes bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
@keyframes shake   { 0%,100%{transform:translateX(-5px)} 50%{transform:translateX(5px)} }

.spin   { animation: spin   2s linear infinite; }
.bounce { animation: bounce 0.8s infinite; }
.shake  { animation: shake  0.5s infinite; }
</style>
</head>
<body>

<nav class="navbar">
    <a href="메인_페이지.html" class="nav-left">
        <img src="img/뇌-파랑.png" class="brain-logo" alt="로고">
        <span class="logo-text">브레인 코드</span>
    </a>
    <ul class="menu">
        <li><a href="메인_페이지.html">홈</a></li>
        <li><a href="로그인_페이지.html">로그인</a></li>
    </ul>
</nav>

<button id="soundToggle">🔇</button>

<div class="container">
    <h1>🧠 두뇌 놀이터</h1>
    <p class="subtitle">게임을 선택해서 시작해 보세요!</p>

    <div id="menu-screen">
        <div class="menu-grid">
            <button class="game-btn" onclick="startMotionGame()">
                <span class="btn-icon">🎮</span>
                움직임 찾기
            </button>
            <button class="game-btn" onclick="startColorGame()">
                <span class="btn-icon">🎨</span>
                색깔 찾기
            </button>
            <button class="game-btn" onclick="startMemoryGame()">
                <span class="btn-icon">🧠</span>
                카드 짝 맞추기
            </button>
        </div>
    </div>

    <div id="gameArea"></div>
</div>

<script>
let soundOn = false;
const gameArea = document.getElementById("gameArea");
const menuScreen = document.getElementById("menu-screen");

document.getElementById("soundToggle").onclick = () => {
    soundOn = !soundOn;
    document.getElementById("soundToggle").textContent = soundOn ? "🔊" : "🔇";
};

function playSound() {
    if (!soundOn) return;
    new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function hideMenu() { menuScreen.style.display = "none"; gameArea.style.display = "block"; }
function backMenu()  { gameArea.innerHTML = ""; gameArea.style.display = "none"; menuScreen.style.display = "block"; }

function makeBackBtn() {
    const btn = document.createElement("button");
    btn.className = "back-btn";
    btn.innerHTML = "← 메뉴로 돌아가기";
    btn.onclick = backMenu;
    return btn;
}

/* 움직임 찾기 */
function startMotionGame() {
    hideMenu();
    const types = [
        { class: "spin",   text: "빙글빙글 도는 것을 누르세요 🔄" },
        { class: "bounce", text: "점프하는 것을 누르세요 ⬆️" },
        { class: "shake",  text: "좌우로 흔들리는 것을 누르세요 ↔️" }
    ];
    const type = types[Math.floor(Math.random() * types.length)];
    gameArea.innerHTML = `<p class="game-title">${type.text}</p>`;
    const grid = document.createElement("div");
    grid.className = "card-grid";
    const answer = Math.floor(Math.random() * 6);
    for (let i = 0; i < 6; i++) {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = "⭐";
        if (i === answer) card.classList.add(type.class);
        card.onclick = () => { if (i === answer) { playSound(); startMotionGame(); } else { card.style.borderColor = "#E07A7A"; setTimeout(() => card.style.borderColor = "", 600); } };
        grid.appendChild(card);
    }
    gameArea.appendChild(grid);
    gameArea.appendChild(makeBackBtn());
}

/* 색깔 찾기 */
function startColorGame() {
    hideMenu();
    const colors = [
        { name: "빨간색", value: "#E07A7A" },
        { name: "파란색", value: "#6B9FD4" },
        { name: "초록색", value: "#7ABF8E" },
        { name: "노란색", value: "#F0C96B" },
        { name: "보라색", value: "#A48EC7" },
        { name: "주황색", value: "#E8A87C" }
    ];
    const target = colors[Math.floor(Math.random() * colors.length)];
    gameArea.innerHTML = `<p class="game-title">${target.name}을 누르세요 🎨</p>`;
    const grid = document.createElement("div");
    grid.className = "card-grid";
    const answerIndex = Math.floor(Math.random() * 6);
    for (let i = 0; i < 6; i++) {
        const card = document.createElement("div");
        card.className = "color-card";
        let color = i === answerIndex ? target : (() => { let c; do { c = colors[Math.floor(Math.random() * colors.length)]; } while (c.value === target.value); return c; })();
        card.style.background = color.value;
        card.onclick = () => { if (color.value === target.value) { playSound(); startColorGame(); } else { card.style.opacity = "0.4"; setTimeout(() => card.style.opacity = "1", 600); } };
        grid.appendChild(card);
    }
    gameArea.appendChild(grid);
    gameArea.appendChild(makeBackBtn());
}

/* 카드 짝 맞추기 */
let firstCard = null, lock = false, matched = 0;

function startMemoryGame() {
    hideMenu();
    gameArea.innerHTML = '<p class="game-title">같은 카드를 맞춰보세요 🧠</p>';
    firstCard = null; lock = false; matched = 0;
    const icons = ["🍎","🍌","🍇","🍓"];
    let cards = [...icons, ...icons].sort(() => Math.random() - 0.5);
    const grid = document.createElement("div");
    grid.className = "card-grid";
    cards.forEach(icon => {
        const card = document.createElement("div");
        card.className = "card";
        card.textContent = "❓";
        card.dataset.icon = icon;
        card.onclick = () => {
            if (lock || card.textContent !== "❓") return;
            card.textContent = icon;
            if (!firstCard) { firstCard = card; return; }
            if (firstCard.dataset.icon === card.dataset.icon) {
                playSound(); matched++;
                firstCard = null;
                if (matched === 4) setTimeout(() => { alert("잘했어요! 🎉"); startMemoryGame(); }, 600);
            } else {
                lock = true;
                setTimeout(() => { card.textContent = "❓"; firstCard.textContent = "❓"; firstCard = null; lock = false; }, 800);
            }
        };
        grid.appendChild(card);
    });
    gameArea.appendChild(grid);
    gameArea.appendChild(makeBackBtn());
}
</script>
</body>
</html>
