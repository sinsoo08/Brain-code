<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>뇌 기능 훈련 게임 — 브레인 코드</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>

<!-- 네비게이션 바 -->
<nav class="navbar">
    <button class="nav-logo" id="logoBtn">
        <img src="img/brain-blue.png" class="brain-logo" alt="브레인 코드 로고" />
        <span class="logo-text">브레인 코드</span>
    </button>
    <div class="nav-right">
        <button class="nav-btn" id="openStatsBtn">통계</button>
        <button class="nav-btn" id="openSettingsBtn">설정</button>
    </div>
</nav>

<main class="page-body">
    <div class="page-inner">

        <!-- 뇌 영역 선택 뷰 -->
        <div id="brainSelectView">
            <div class="page-hero">
                <h1>어떤 게임을 할까요?</h1>
                <p>뇌의 영역에 마우스를 올리고 클릭해 보세요!</p>
            </div>
            <div class="brain-stage" id="brainStage">
                <img class="brain-img"
                     src="img/brain.png"
                     alt="뇌 그림" />
                <svg class="brain-svg" id="brainSvg" viewBox="0 0 1280 698" preserveAspectRatio="none">
                    <defs>
                        <mask id="dimMask">
                            <rect x="0" y="0" width="1280" height="698" fill="white"/>
                            <polygon id="brightRegion" points="" fill="black"/>
                        </mask>
                    </defs>
                    <rect id="dimOverlay" x="0" y="0" width="1280" height="698"
                          fill="rgba(10,25,60,0.58)" mask="url(#dimMask)"
                          style="display:none; pointer-events:none;"/>
                </svg>
                <div class="brain-label" id="brainLabel">
                    <span class="brain-label-name" id="brainLabelName"></span>
                    <span class="brain-label-desc" id="brainLabelDesc"></span>
                    <span class="brain-label-hint">클릭해서 게임 시작!</span>
                </div>
            </div>
        </div>

        <!-- 게임 뷰 -->
        <div id="gameView">
            <div class="game-card">
                <div class="game-header-bar">
                    <div class="game-region-info">
                        <img class="game-region-thumb" id="gameRegionThumb" src="img/brain-blue.png" alt="" />
                        <span class="game-region-name" id="gameRegionName"></span>
                        <span class="score-display" id="todayScoreDisplay">점수: 0</span>
                    </div>
                    <button class="btn ghost" id="backToBrainBtn">← 영역 다시 선택</button>
                </div>
                <div class="game-shell" id="gameShell">
                    <div class="center-box" style="min-height:300px;">
                        <div class="game-inner-title">영역을 선택해 주세요</div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<div style="display:none">
    <div id="totalPlaysValue">0</div>
    <div id="bestScoreValue">0</div>
    <div id="accuracyValue">0%</div>
    <div id="bestReactionValue">-</div>
</div>

<!-- 설정 모달 -->
<div class="modal-backdrop" id="settingsModal">
    <div class="modal">
        <div class="modal-head">
            <h3>설정</h3>
            <button class="btn ghost" style="font-size:15px;padding:10px 18px;" id="closeSettingsBtn">닫기</button>
        </div>
        <p>게임 진행에 필요한 기본 옵션입니다.</p>
        <div class="modal-grid">
            <div class="setting-item">
                <label for="soundToggle">효과 문구 표시</label>
                <select class="select" id="soundToggle"><option value="on">켜기</option><option value="off">끄기</option></select>
            </div>
            <div class="setting-item">
                <label for="autoShowStats">결과 후 통계 문구</label>
                <select class="select" id="autoShowStats"><option value="on">켜기</option><option value="off">끄기</option></select>
            </div>
        </div>
    </div>
</div>

<!-- 통계 모달 -->
<div class="modal-backdrop" id="statsModal">
    <div class="modal stats-modal">
        <div class="modal-head" style="position:sticky;top:0;background:white;z-index:10;padding-bottom:12px;border-bottom:1.5px solid var(--blue-pale);">
            <h3>플레이 통계</h3>
            <div style="display:flex;gap:8px;">
                <button class="btn ghost" style="font-size:14px;padding:9px 16px;" id="resetStatsBtn">초기화</button>
                <button class="btn ghost" style="font-size:14px;padding:9px 16px;" id="closeStatsBtn">닫기</button>
            </div>
        </div>
        <div class="modal-grid" id="quickStatsModalBody" style="margin-top:20px;"></div>
        <div style="margin-top:28px;border-top:1.5px solid var(--blue-pale);padding-top:20px;">
            <h4>게임별 세부 기록</h4>
            <div id="detailStatsInModal"></div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
