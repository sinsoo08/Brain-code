<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아바타 선택 - 브레인코드</title>
    <link rel="icon" href="img/brain-blue.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="avatar.css">
</head>
<body>

    <div class="form-card">

        <div class="card-header">
            <h2>아바타 선택</h2>
            <p>나를 대표할 캐릭터를 골라보세요</p>
        </div>

        <div class="preview-section">
            <div class="preview-wrap" id="preview-wrap">
                <div class="preview-placeholder" id="preview-placeholder">
                    <span class="preview-icon">👆</span>
                    <span class="preview-hint">캐릭터를 선택해 주세요</span>
                </div>
                <div class="preview-selected" id="preview-selected" style="display:none">
                    <img id="preview-img" src="" alt="선택된 아바타">
                    <span id="preview-emoji" class="preview-emoji" style="display:none"></span>
                </div>
            </div>
            <p class="preview-name" id="preview-name">&nbsp;</p>
        </div>

        <div class="form-section">
            <div class="section-label">
                <div class="icon">🐾</div>
                캐릭터 선택
            </div>
        </div>

        <div class="avatar-section">
            <div class="avatar-grid">
                <div class="avatar-item" data-src="img/dog.png" data-name="강아지" data-emoji="🐶">
                    <div class="avatar-img-wrap">
                        <img src="img/dog.png" alt="강아지" onerror="handleOnError(this)">
                        <span class="avatar-emoji" style="display:none">🐶</span>
                    </div>
                    <span class="avatar-name">강아지</span>
                </div>
                <div class="avatar-item" data-src="img/cat.png" data-name="고양이" data-emoji="🐱">
                    <div class="avatar-img-wrap">
                        <img src="img/cat.png" alt="고양이" onerror="handleOnError(this)">
                        <span class="avatar-emoji" style="display:none">🐱</span>
                    </div>
                    <span class="avatar-name">고양이</span>
                </div>
                <div class="avatar-item" data-src="img/axolotl.png" data-name="우파루파" data-emoji="🦎">
                    <div class="avatar-img-wrap">
                        <img src="img/axolotl.png" alt="우파루파" onerror="handleOnError(this)">
                        <span class="avatar-emoji" style="display:none">🦎</span>
                    </div>
                    <span class="avatar-name">우파루파</span>
                </div>
                <div class="avatar-item" data-src="img/raccoon.png" data-name="라쿤" data-emoji="🦝">
                    <div class="avatar-img-wrap">
                        <img src="img/raccoon.png" alt="라쿤" onerror="handleOnError(this)">
                        <span class="avatar-emoji" style="display:none">🦝</span>
                    </div>
                    <span class="avatar-name">라쿤</span>
                </div>
                <div class="avatar-item" data-src="img/bear.png" data-name="곰" data-emoji="🐻">
                    <div class="avatar-img-wrap">
                        <img src="img/bear.png" alt="곰" onerror="handleOnError(this)">
                        <span class="avatar-emoji" style="display:none">🐻</span>
                    </div>
                    <span class="avatar-name">곰</span>
                </div>
            </div>
        </div>

        <div class="form-footer">
            <button class="submit-btn" onclick="handleSubmit()">
                이 캐릭터로 시작하기 →
            </button>
        </div>

    </div>

    <script src="avatar.js"></script>

</body>
</html>
